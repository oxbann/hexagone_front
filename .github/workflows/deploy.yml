name: Build and deploy to OVH

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.OVH_FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.OVH_FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.OVH_FTP_PASSWORD }}
      FTP_DIR: ${{ secrets.OVH_FTP_DIR || './www/' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Deploy to OVH
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ env.FTP_DIR }}

      - name: Explain skipped deployment
        if: ${{ env.FTP_SERVER == '' || env.FTP_USERNAME == '' || env.FTP_PASSWORD == '' }}
        run: echo "OVH FTP secrets missing. Add OVH_FTP_SERVER, OVH_FTP_USERNAME and OVH_FTP_PASSWORD in repository secrets."

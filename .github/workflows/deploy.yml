name: Build and deploy to OVH

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SFTP_HOST: ${{ secrets.OVH_SFTP_HOST }}
      SFTP_USER: ${{ secrets.OVH_SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.OVH_SFTP_PASSWORD }}
      SFTP_PORT: ${{ secrets.OVH_SFTP_PORT || '22' }}
      SFTP_DIR: ${{ secrets.OVH_SFTP_DIR || 'www' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Install SFTP client
        if: ${{ env.SFTP_HOST != '' && env.SFTP_USER != '' && env.SFTP_PASSWORD != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy static site over SFTP
        if: ${{ env.SFTP_HOST != '' && env.SFTP_USER != '' && env.SFTP_PASSWORD != '' }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          mkdir -p "$SFTP_DIR"
          mirror --reverse --delete --verbose ./out "$SFTP_DIR"
          bye
          EOF

      - name: Explain skipped deployment
        if: ${{ env.SFTP_HOST == '' || env.SFTP_USER == '' || env.SFTP_PASSWORD == '' }}
        run: echo "OVH SFTP secrets missing. Add OVH_SFTP_HOST, OVH_SFTP_USER and OVH_SFTP_PASSWORD in repository secrets."

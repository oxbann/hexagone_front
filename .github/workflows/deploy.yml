name: Build and deploy to OVH

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.OVH_SSH_HOST }}
      SSH_USER: ${{ secrets.OVH_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.OVH_SSH_PORT || '22' }}
      SSH_DIR: ${{ secrets.OVH_SSH_DIR || 'www' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Configure SSH key
        if: ${{ env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/ovh_deploy_key
          chmod 600 ~/.ssh/ovh_deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy static site over SSH
        if: ${{ env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_PRIVATE_KEY != '' }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/ovh_deploy_key -p $SSH_PORT" \
            ./out/ "$SSH_USER@$SSH_HOST:$SSH_DIR/"

      - name: Explain skipped deployment
        if: ${{ env.SSH_HOST == '' || env.SSH_USER == '' || env.SSH_PRIVATE_KEY == '' }}
        run: echo "OVH SSH secrets missing. Add OVH_SSH_HOST, OVH_SSH_USER and OVH_SSH_PRIVATE_KEY in repository secrets."
